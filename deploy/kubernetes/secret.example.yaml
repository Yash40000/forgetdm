apiVersion: v1
kind: Secret
metadata:
  name: forgetdm-secrets
type: Opaque
stringData:
  FORGETDM_DB_URL: "jdbc:postgresql://managed-postgres:5432/forgetdm"
  FORGETDM_DB_USER: "replace"
  FORGETDM_DB_PASS: "replace"
  FORGETDM_MASKING_SECRET: "replace-with-32-plus-random-characters"
  FORGETDM_CAPSULE_SECRET: "replace-with-a-different-32-plus-character-secret"
  FORGETDM_SECURITY_BOOTSTRAP_PASSWORD: "replace-before-first-start"
---
apiVersion: v1
kind: Secret
metadata:
  name: forgetdm-jdbc-drivers
type: Opaque
# Proprietary JDBC jars are usually too large for a Secret. Replace this with a CSI volume,
# init-container artifact download, or baked private image in production.
